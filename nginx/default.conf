server {
    listen 80;
    server_name _;

    root /app/nginx;

    location = / {
        return 302 /onboarding.html;
    }

    location = /onboarding.html {
        try_files /onboarding.html =404;
    }

    location = /dashboard {
        try_files /dashboard.html =404;
    }

    location = /extension-install.html {
        try_files /extension-install.html =404;
    }

    location = /import-cookies.html {
        try_files /import-cookies.html =404;
    }

    location = /styles.css {
        try_files /styles.css =404;
    }

    location /downloads/ {
        alias /app/nginx/downloads/;
    }

    location /cookies {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /onboard {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /qc {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8001;
    }

    location /login-proxy/ {
        alias /app/nginx/login-proxy/;
    }
}
