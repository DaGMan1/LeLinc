<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LeLinc — Get Started</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 28px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px;
    box-shadow: var(--shadow);
  }
  .steps {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .steps .seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: var(--border);
  }
  .steps .seg.active { background: var(--accent); }
  .steps .label { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }

  h1 { font-size: 1.35rem; margin: 0 0 6px; letter-spacing: -0.01em; }
  p.sub { color: var(--text-muted); margin: 0 0 26px; font-size: 0.92rem; max-width: 42ch; }

  label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
  .field { margin-bottom: 18px; }
  input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.98rem;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-muted); opacity: 0.7; }
  input:focus { outline: none; border-color: var(--accent); background: var(--surface); }

  button[type="submit"] { width: 100%; margin-top: 4px; }

  .status {
    margin-top: 16px;
    font-size: 0.86rem;
    color: var(--text-muted);
    text-align: center;
    min-height: 1.2em;
  }
  .status.active { color: var(--accent-strong); }
  .status.error { color: var(--danger); }
</style>
</head>
<body>

  <a class="brand-mark" href="/"><span class="dot"></span>LeLinc</a>

  <div class="card">
    <div class="steps" aria-hidden="true">
      <span class="label">Profile</span>
      <span class="seg active"></span>
      <span class="seg"></span>
      <span class="label">Connect</span>
    </div>

    <h1>Let's profile your business</h1>
    <p class="sub">Three fields, one click. We scan what's publicly visible and build a report before anything gets connected.</p>

    <form id="onboard-form">
      <div class="field">
        <label for="business_name">Business name</label>
        <input id="business_name" name="business_name" type="text" required autocomplete="organization" />
      </div>
      <div class="field">
        <label for="domain">Domain / website</label>
        <input id="domain" name="domain" type="text" required autocomplete="url" placeholder="example.com.au" />
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" required autocomplete="email" />
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Start profiling</button>
    </form>

    <div class="status" id="status" role="status" aria-live="polite"></div>
  </div>

  <span class="eyebrow">Key View Digital</span>

<script>
const form = document.getElementById("onboard-form");
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submit-btn");

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status" + (cls ? " " + cls : "");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = "Starting…";
  setStatus("");

  const payload = {
    business_name: document.getElementById("business_name").value,
    domain: document.getElementById("domain").value,
    email: document.getElementById("email").value,
  };

  try {
    const res = await fetch("/onboard", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("Failed to start profiling");
    const { client_id } = await res.json();
    pollStatus(client_id);
  } catch (err) {
    setStatus("Something went wrong - please try again.", "error");
    submitBtn.disabled = false;
    submitBtn.textContent = "Start profiling";
  }
});

async function pollStatus(clientId) {
  setStatus("Profiling in progress — this can take a minute…", "active");
  const poll = setInterval(async () => {
    const res = await fetch(`/onboard/status/${clientId}`);
    const job = await res.json();
    if (job.status === "complete") {
      clearInterval(poll);
      setStatus("Done — taking you to your dashboard…", "active");
      window.location.href = `/dashboard?client_id=${clientId}`;
    } else if (job.status === "failed") {
      clearInterval(poll);
      setStatus("Profiling failed - please try again or contact support.", "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Start profiling";
    }
  }, 3000);
}
</script>
</body>
</html>
